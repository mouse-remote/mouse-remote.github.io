<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Mouse Remote — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a0f; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .card { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 40px 32px; }
    h1 { font-size: 20px; font-weight: 600; }
    p  { font-size: 14px; color: #6b7280; }
    .github-btn { display: flex; align-items: center; gap: 10px; background: #24292f; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; padding: 13px 24px; cursor: pointer; transition: background 0.15s; }
    .github-btn:hover, .github-btn:active { background: #353b43; }
    .github-btn:disabled { opacity: 0.5; cursor: default; }
    .success { font-size: 15px; color: #22c55e; display: none; }
    .success.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in to Mouse Remote</h1>
    <p>Authenticate with GitHub to link your phone to the extension.</p>
    <button class="github-btn" id="btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
      Sign in with GitHub
    </button>
    <p class="success" id="success">Signed in! You can close this tab.</p>
  </div>

  <script type="module">
    import { startLogin, getAuth } from './auth.js';

    // Already signed in from a previous session — nothing to do.
    if (getAuth()) {
      document.getElementById('btn').style.display = 'none';
      document.getElementById('success').classList.add('visible');
    }

    document.getElementById('btn').addEventListener('click', () => {
      document.getElementById('btn').disabled = true;
      startLogin();
    });

    // startLogin() uses a popup + postMessage flow. auth.js calls saveAuth()
    // which dispatches 'mr-auth-ready', picked up by the extension's content.js.
    // The background will close this tab automatically once auth is received.
  </script>
</body>
</html>
